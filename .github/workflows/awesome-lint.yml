name: awesome-lint

# Enforce the sindresorhus/awesome list guidelines on the README.
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "README.md"
      - "LICENSE"
      - ".github/workflows/awesome-lint.yml"

permissions:
  contents: read

jobs:
  awesome-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      # awesome-lint's license rule queries the GitHub API for the repo's
      # detected license, so it only turns green once the CC0 LICENSE has landed
      # on the default branch (i.e. after this change is merged).
      - name: Run awesome-lint
        run: npx --yes awesome-lint
